="M2 12h2"></path> <path d="M20 12h2"></path> <path d="m6.3 17.7-1.4 1.4"></path> <path d="m19.1 4.9-1.4 1.4"></path>  </svg> </button> </header>  <div class="content-grid archive-grid"> <section class="page-main"> <div class="section-title"> <h1>笔记归档</h1> <p>按时间与主题浏览公开内容。</p> </div> <div class="archive-toolbar card"> <label for="archive-search">搜索归档</label> <input id="archive-search" type="search" placeholder="搜索标题、摘要或标签" autocomplete="off"> </div> <section class="empty-state card"><h2>暂无公开笔记</h2><p>归档会在第一篇笔记发布后自动生成。</p></section> <p class="archive-empty" data-archive-empty hidden>没有找到匹配的笔记。</p> </section> <aside class="rightbar"> <section class="widget card"> <h2>按主题筛选</h2> <div class="tag-cloud"> <button class="tag-button active" type="button" data-tag-filter="">全部</button>  </div> </section> </aside> </div> <script>
    const params = new URLSearchParams(window.location.search);
    const searchInput = document.querySelector("#archive-search");
    const noteRows = [...document.querySelectorAll("[data-note]")];
    const filterButtons = [...document.querySelectorAll("[data-tag-filter]")];
    const noResults = document.querySelector("[data-archive-empty]");
    let activeTag = params.get("tag") || "";
    if (searchInput) searchInput.value = params.get("q") || "";
    function applyFilters() {
      const query = (searchInput?.value || "").trim().toLowerCase();
      let visible = 0;
      noteRows.forEach((row) => {
        const matchesQuery = !query || row.dataset.search.includes(query);
        const matchesTag = !activeTag || row.dataset.tags.split("|").includes(activeTag);
        const matches = matchesQuery && matchesTag;
        row.hidden = !matches;
        if (matches) visible += 1;
      });
      if (noResults) noResults.hidden = visible !== 0;
      filterButtons.forEach((button) => button.classList.toggle("active", button.dataset.tagFilter === activeTag));
    }
    searchInput?.addEventListener("input", applyFilters);
    filterButtons.forEach((button) => button.addEventListener("click", () => {
      activeTag = button.dataset.tagFilter || "";
      applyFilters();
    }));
    applyFilters();
  </script>  <footer class="site-footer">Built from selected Obsidian notes. No unpublished material is included.</footer> </main> </div> <script>
      const savedTheme = localStorage.getItem("site-theme");

        const query = new FormData(form).get("q")?.toString().trim();
        window.location.assign(query ? `/archive/?q=${encodeURIComponent(query)}` : "/archive/");
      });
      document.querySelector("[data-clear-search]")?.addEventListener("click", () => {
